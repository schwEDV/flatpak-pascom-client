name: Flatpak Build

on:
  push:
    branches: [main]
  pull_request:
  # Wöchentlich: schlägt fehl, sobald pascom eine neue Client-Version
  # veröffentlicht (sha256 im Manifest ist gepinnt) -> Update-Kanarienvogel.
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: pascom_Client.flatpak
          manifest-path: net.pascom.pascom_Client.json
          cache-key: flatpak-builder-${{ github.sha }}
