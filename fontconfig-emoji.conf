<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Fedora (und andere aktuelle Distros) liefern "Noto Color Emoji" im
  COLRv1-Format aus (Noto-COLRv1.ttf). Flatpak blendet die Host-Fonts unter
  /run/host/fonts ein, wo fontconfig sie bevorzugt findet. Das Qt des Clients
  rastert COLRv1 nicht: Der Font meldet die Glyphe als vorhanden, also greift
  kein Fallback, gerendert wird aber nichts -> Emoji sind im Chat unsichtbar.

  Loesung: die COLRv1-Datei aussortieren. Damit greift die Bitmap-Variante
  (CBDT/CBLC) NotoColorEmoji.ttf aus org.freedesktop.Platform, die Qt kann.

  Der Glob braucht einen echten Pfad-Praefix, ein fuehrendes "*" matcht in
  fontconfig nicht ueber Verzeichnisgrenzen hinweg. Daher mehrere Tiefen.
-->
<fontconfig>
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
  <selectfont>
    <rejectfont>
      <glob>/run/host/fonts/Noto-COLRv1.ttf</glob>
      <glob>/run/host/fonts/*/Noto-COLRv1.ttf</glob>
      <glob>/run/host/fonts/*/*/Noto-COLRv1.ttf</glob>
    </rejectfont>
  </selectfont>
</fontconfig>
